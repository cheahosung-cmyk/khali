<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Khali · 빗썸 자동매매</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
         margin: 0; background: #0f1115; color: #e6e6e6; }
  header { padding: 16px 24px; background: #171a21; display: flex;
           align-items: center; gap: 16px; border-bottom: 1px solid #262b36; }
  h1 { font-size: 18px; margin: 0; }
  .mode { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; }
  .mode.paper { background: #1d4ed8; }
  .mode.backtest { background: #4b5563; }
  .mode.live { background: #b91c1c; }
  main { padding: 24px; max-width: 980px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .card { background: #171a21; border: 1px solid #262b36; border-radius: 10px;
          padding: 16px; }
  .card .label { font-size: 12px; color: #9aa4b2; }
  .card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .pos { color: #22c55e; } .neg { color: #ef4444; }
  .controls { margin: 20px 0; display: flex; gap: 10px; align-items: center; }
  button { background: #2563eb; color: #fff; border: 0; padding: 10px 18px;
           border-radius: 8px; font-size: 14px; cursor: pointer; }
  button.stop { background: #dc2626; }
  button:disabled { opacity: .5; cursor: default; }
  .status-line { color: #9aa4b2; font-size: 13px; margin: 8px 0 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 8px 10px; border-bottom: 1px solid #262b36; }
  th:first-child, td:first-child { text-align: left; }
  .buy { color: #22c55e; } .sell { color: #ef4444; }
  .err { color: #f59e0b; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Khali · 빗썸 자동매매</h1>
  <span id="mode" class="mode">-</span>
  <span id="market" style="color:#9aa4b2;font-size:13px"></span>
</header>
<main>
  <div class="card" id="loginCard" style="margin-bottom:16px">
    <div class="label" style="margin-bottom:8px">
      빗썸 API 키 (메모리에만 저장 · 디스크 미기록 · 출금권한 없는 키 사용)
    </div>
    <div id="loginForm" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input id="ak" placeholder="Connect/Access Key" style="flex:1;min-width:220px;
        padding:9px;border-radius:8px;border:1px solid #2b3240;background:#0f1115;color:#e6e6e6" />
      <input id="sk" type="password" placeholder="Secret Key" style="flex:1;min-width:220px;
        padding:9px;border-radius:8px;border:1px solid #2b3240;background:#0f1115;color:#e6e6e6" />
      <button onclick="login()">🔑 로그인</button>
    </div>
    <div id="loginState" style="display:none;align-items:center;gap:12px">
      <span class="pos">● 로그인됨 (키 입력 완료)</span>
      <button class="stop" onclick="logout()">로그아웃</button>
    </div>
    <div id="loginErr" class="err" style="margin-top:8px"></div>
  </div>

  <div class="grid">
    <div class="card"><div class="label">총 평가자산</div>
      <div class="value" id="total">-</div></div>
    <div class="card"><div class="label">누적 손익</div>
      <div class="value" id="pnl">-</div></div>
    <div class="card"><div class="label">현금(KRW)</div>
      <div class="value" id="cash">-</div></div>
    <div class="card"><div class="label">현재가</div>
      <div class="value" id="price">-</div></div>
  </div>

  <div class="controls">
    <button id="startBtn" onclick="ctl('start')">▶ 시작</button>
    <button id="stopBtn" class="stop" onclick="ctl('stop')">■ 정지</button>
    <span id="run" class="status-line"></span>
  </div>
  <div class="status-line" id="action"></div>
  <div class="err" id="err"></div>

  <h3>최근 거래</h3>
  <table>
    <thead><tr><th>시각</th><th>구분</th><th>가격</th><th>수량</th>
      <th>금액</th><th>손익</th><th>사유</th></tr></thead>
    <tbody id="trades"></tbody>
  </table>
</main>

<script>
const won = n => (n ?? 0).toLocaleString('ko-KR') + '원';

// ── 인증: 토큰이 필요하면 저장된 토큰을 모든 요청에 첨부 ──
let AUTH_REQUIRED = false;
function token() { return localStorage.getItem('khali_token') || ''; }
async function api(path, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, AUTH_REQUIRED ? { 'X-Auth-Token': token() } : {});
  const r = await fetch(path, opts);
  if (r.status === 401) {
    const t = prompt('대시보드 접근 토큰을 입력하세요 (DASHBOARD_TOKEN):', '');
    if (t) { localStorage.setItem('khali_token', t); return api(path, opts); }
  }
  return r;
}
async function initAuth() {
  try {
    const cfg = await (await fetch('/api/config')).json();
    AUTH_REQUIRED = !!cfg.auth_required;
  } catch (e) {}
}

async function refresh() {
  try {
    const s = await (await api('/api/status')).json();
    const m = document.getElementById('mode');
    m.textContent = (s.mode || '').toUpperCase();
    m.className = 'mode ' + (s.mode || '');
    document.getElementById('market').textContent = s.market + ' · ' + s.strategy;
    document.getElementById('total').textContent = won(s.total_value);
    const pnl = document.getElementById('pnl');
    pnl.textContent = (s.pnl_total >= 0 ? '+' : '') + won(s.pnl_total)
       + ' (' + (s.pnl_pct >= 0 ? '+' : '') + s.pnl_pct + '%)';
    pnl.className = 'value ' + (s.pnl_total >= 0 ? 'pos' : 'neg');
    document.getElementById('cash').textContent = won(s.cash_krw);
    document.getElementById('price').textContent = won(s.last_price);
    document.getElementById('run').textContent =
      s.running ? '● 가동 중' : '○ 정지됨';
    document.getElementById('action').textContent =
      '최근 판단: ' + (s.last_action || '-') + ' — ' + (s.last_reason || '');
    document.getElementById('err').textContent = s.error ? ('⚠ ' + s.error) : '';
    // 로그인 상태 토글 (live 모드는 키 필요)
    document.getElementById('loginForm').style.display = s.has_keys ? 'none' : 'flex';
    document.getElementById('loginState').style.display = s.has_keys ? 'flex' : 'none';
    const needKey = (s.mode === 'live') && !s.has_keys;
    document.getElementById('startBtn').disabled = s.running || needKey;
    document.getElementById('stopBtn').disabled = !s.running;
    document.getElementById('startBtn').title = needKey
      ? 'live 모드는 먼저 API 키 로그인이 필요합니다' : '';

    const trades = await (await api('/api/trades?limit=30')).json();
    document.getElementById('trades').innerHTML = trades.map(t => `
      <tr>
        <td>${new Date(t.ts).toLocaleString('ko-KR')}</td>
        <td class="${t.side}">${t.side === 'buy' ? '매수' : '매도'}</td>
        <td>${won(Math.round(t.price))}</td>
        <td>${(t.volume ?? 0).toFixed(4)}</td>
        <td>${won(Math.round(t.krw))}</td>
        <td class="${t.realized_pnl >= 0 ? 'buy' : 'sell'}">
          ${t.side === 'sell' ? won(Math.round(t.realized_pnl)) : '-'}</td>
        <td style="text-align:left;color:#9aa4b2">${t.reason || ''}</td>
      </tr>`).join('');
  } catch (e) { console.error(e); }
}
async function ctl(action) {
  await api('/api/' + action, { method: 'POST' });
  refresh();
}
async function login() {
  const ak = document.getElementById('ak').value.trim();
  const sk = document.getElementById('sk').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!ak || !sk) { errEl.textContent = 'Key 를 모두 입력하세요.'; return; }
  const r = await (await api('/api/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ access_key: ak, secret_key: sk })
  })).json();
  if (!r.ok) { errEl.textContent = '⚠ ' + r.error; }
  else { document.getElementById('ak').value = ''; document.getElementById('sk').value = ''; }
  refresh();
}
async function logout() {
  await api('/api/logout', { method: 'POST' });
  refresh();
}
(async () => { await initAuth(); refresh(); setInterval(refresh, 5000); })();
</script>
</body>
</html>
